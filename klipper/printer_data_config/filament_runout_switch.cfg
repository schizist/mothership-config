# Filament Runout Detection (PC15)
[filament_switch_sensor sfs_runout]
switch_pin: PC15
pause_on_runout: False
runout_gcode: RUNOUT_DELAY_PAUSE
insert_gcode:
  {action_call_remote_method("notify",
    name="ntfy_print",
    title="Filament restored",
    message="Filament detected again on runout sensor.")}
event_delay: 3.0
pause_delay: 0.5

# Filament Motion Detection (PC12)
[filament_motion_sensor sfs_motion]
detection_length: 7.0
extruder: extruder
switch_pin: PC12
pause_on_runout: True
runout_gcode:
  {action_call_remote_method("notify",
    name="ntfy_gcode",
    title="Filament motion fault",
    message="Filament motion fault detected. Print paused.")}
  PAUSE
insert_gcode:
  {action_call_remote_method("notify",
    name="ntfy_print",
    title="Filament motion restored",
    message="Filament motion detected again.")}
event_delay: 3.0
pause_delay: 0.5

# --- Macros ---

[gcode_macro NOTIFY_FILAMENT_RUNOUT]
description: Send notification for filament runout
gcode:
  {action_call_remote_method("notify",
    name="ntfy_print",
    title="Filament runout",
    message="Runout sensor triggered. Extruding reserve filament, then pausing print.")}

[gcode_macro NOTIFY_FILAMENT_PAUSED]
description: Send notification after pause
gcode:
  {action_call_remote_method("notify",
    name="ntfy_print",
    title="Print paused for filament",
    message="Printer is paused due to filament runout. Load filament and resume when ready.")}

[gcode_macro RUNOUT_DELAY_PAUSE]
description: Extrude 250mm before pausing on filament runout
gcode:
    {action_call_remote_method("notify",
      name="ntfy_gcode",
      message="Filament runout detected. Consuming remaining filament then pausing.")}

    {% if printer.extruder.can_extrude %}
      G91
      G1 E250 F600
      G90
    {% endif %}

    PAUSE

    {action_call_remote_method("notify",
      name="ntfy_gcode",
      message="Printer paused due to filament runout.")}