# Filament Runout Detection (PC15)
[filament_switch_sensor sfs_runout]
switch_pin: PC15
pause_on_runout: False                # don't auto-pause, use macro
runout_gcode: RUNOUT_DELAY_PAUSE
event_delay: 3.0
pause_delay: 0.5

# Filament Motion Detection (PC12)
[filament_motion_sensor sfs_motion]
detection_length: 7.0       # mm of filament with no movement before triggering
extruder: extruder
switch_pin: PC12
pause_on_runout: True
runout_gcode: PAUSE
# insert_gcode removed so it waits for manual confirmation
event_delay: 3.0
pause_delay: 0.5

# --- Macros ---
[gcode_macro RUNOUT_DELAY_PAUSE]
description: Extrude 250mm before pausing on filament runout
gcode:
    {% if printer.extruder.can_extrude %}
      # extrude 250mm at safe speed
      G91                             ; relative mode
      G1 E250 F600                    ; extrude 250mm
      G90                             ; back to absolute
    {% endif %}
    PAUSE
