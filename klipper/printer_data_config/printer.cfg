min_extrude_temp: 170
min_temp: 15
max_temp: 290
max_extrude_only_distance: 300
max_extrude_cross_section: 5.0
pressure_advance: 0.1

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 1.4
hold_current: 0.7
stealthchop_threshold: 999999



