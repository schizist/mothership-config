[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40.10
endstop_pin: ^PC0
position_min: -15
position_endstop: -15
position_max: 285 
homing_speed: 100

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 1.4
hold_current: 1.12
stealthchop_threshold: 999999



