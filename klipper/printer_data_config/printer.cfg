# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v3.0. To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication.

# The "make flash" command does not work on the SKR mini E3. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.

#-----------------------------------------------------------------------------------------
#-----------------------------------------------------------------------------------------

[board_pins]
aliases:
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_2E00380012504B5735313920-if00
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 450
max_accel: 4800 #TESTED USING SPEED TEST MACRO UP TO 6000 WITHOUT SKIPPING, REDUCED BY 20% FOR CAUTION.
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 8

[temperature_sensor MCU]
sensor_type: temperature_mcu
min_temp: 15
max_temp: 100

[temperature_sensor Host]
sensor_type: temperature_host
min_temp: 15
max_temp: 100

[display_status]

[servo nozzle_light]
pin: PA8
initial_angle: 90     # 360 servo to control nozzle-cam light brightness
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025

[pause_resume]
recover_velocity: 50.
#   When capture/restore is enabled, the speed at which to return to
#   the captured position (in mm/s). Default is 50.0 mm/s.

[output_pin LED_BLACK]
pin: PD0  # GPIO pin
value: 1

[heater_fan heatbreak_cooling_fan]
pin:PB15

[multi_pin my_enable_pin]
pins: PC6,PC7

[fan]
pin: multi_pin:my_enable_pin

[exclude_object]

[include filament_runout_switch.cfg]

[include input_shaper.cfg]

[include KAMP_Settings.cfg]

[include macros.cfg]

[include timelapse.cfg]

[virtual_sdcard]
path: /home/gort/printer_data/gcodes

[idle_timeout]
gcode: 
  M118 IDLE... POWERING DOWN
  M84
  M104 S0
  M140 S0
  #M109 S50
  G4 S30
  POWER_OFF_PRINTER

#   A list of G-Code commands to execute on an idle timeout. See
#   docs/Command_Templates.md for G-Code format. The default is to run
#   "TURN_OFF_HEATERS" and "M84".
#timeout: 600
#   Idle time (in seconds) to wait before running the above G-Code
#   commands. The default is 600 seconds.

[respond]
#default_type: echo
#   Sets the default prefix of the "M118" and "RESPOND" output to one
#   of the following:
#       echo: "echo: " (This is the default)
#       command: "// "
#       error: "!! "
default_prefix: PRINTER:
#   Directly sets the default prefix. If present, this value will
#   override the "default_type".

[firmware_retraction]
retract_length: 0.6
retract_speed: 35
unretract_speed: 35




