[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 7.98
full_steps_per_rotation: 200
position_min: -3
endstop_pin: probe: z_virtual_endstop
position_max: 300

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.8
hold_current: 0.64
stealthchop_threshold: 999999

[bltouch]
sensor_pin: ^PC2
control_pin: PA1
x_offset: 0
y_offset: -36

[safe_z_home]
home_xy_position: 145, 140.75
speed: 125
z_hop: 10          
z_hop_speed: 10

[bed_mesh]
speed: 125
horizontal_move_z: 6
mesh_min: 0, 0 
mesh_max: 240, 240 
probe_count: 5,5
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
mesh_pps:2
bicubic_tension: 0.2
move_check_distance: 5
split_delta_z: 0.025

[screws_tilt_adjust] #SCREWS_TILT_CALCULATE IS THE COMMAND TO RUN
screw1: 21.5, 57.5 
screw1_name: front left screw
screw2: 263.5, 57.5 
screw2_name: front right screw
screw3: 263.5, 270
screw3_name: rear right screw
screw4: 21.5, 270
screw4_name: rear left screw
horizontal_move_z: 10
speed: 125
screw_thread: CW-M4



