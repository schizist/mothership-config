[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 39.98
endstop_pin: ^PC1
position_min: -20
position_endstop: -19
position_max: 270
homing_speed: 100

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 1.4 
hold_current: 1.12
stealthchop_threshold: 999999



