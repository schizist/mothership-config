          - "10"
          - -segment_format
          - mp4
          - -reset_timestamps
          - "1"
          - -strftime
          - "1"
          - -c:v
          - copy
          - -c:a
          - copy
      inputs:
        - path: rtsp://127.0.0.1:8554/turret02_sub
          input_args: preset-rtsp-restream
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/turret02_main
          input_args: preset-rtsp-restream
          roles:
            - record
    record:
      enabled: true
    detect:
      enabled: true
      width: 704
      height: 480
      fps: 5

  Turret_2:
    enabled: true
    objects:
      track:
        - person
        - dog
        - cat
        - car
    ffmpeg:
      output_args:
        record:
          - -f
          - segment
          - -segment_time
          - "10"
          - -segment_format
          - mp4
          - -reset_timestamps
          - "1"
          - -strftime
