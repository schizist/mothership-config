  axis_thermal:
    enabled: true
    objects:
      track:
        - person
        - dog
        - cat
        - car
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/axis_detect
          input_args: preset-rtsp-restream
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/axis_view
          input_args: preset-rtsp-restream
          roles:
